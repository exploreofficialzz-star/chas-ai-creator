name: chas_ai_creator
description: chAs AI Creator - AI-powered video content automation platform (Nigeria Friendly Version)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0
  google_fonts: ^4.0.4
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  introduction_screen: ^3.1.14
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.0.1
  
  # Networking
  dio: ^5.4.0
  http: ^1.1.0
  retrofit: ^4.0.3
  connectivity_plus: ^5.0.2
  
  # Authentication
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Video
  video_player: ^2.8.2
  chewie: ^1.7.1
  
  # Image
  image_picker: ^1.0.7
  photo_view: ^0.14.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.3.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # Ads - Unity Ads
  unity_ads_plugin: ^0.3.8
  
  # Payments - Paystack (Use flutter_paystack with override)
  flutter_paystack: ^1.0.7
  
  # Alternative: Use http for custom Paystack integration
  # http is already included above
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # WebView for Paystack
  webview_flutter: ^4.4.2

dependency_overrides:
  # Fix for flutter_paystack compatibility issues
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
