name: chas_ai_creator
description: chAs AI Creator - AI-powered video content automation platform

# Created by: chAs
# Copyright (c) 2024 chAs. All rights reserved.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  introduction_screen: ^3.1.14
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1
  
  # Navigation
  go_router: ^13.0.1
  
  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  connectivity_plus: ^5.0.2
  
  # Authentication
  firebase_auth: ^4.16.0
  firebase_core: ^2.24.2
  google_sign_in: ^6.1.6
  sign_in_with_apple: ^5.0.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Video
  video_player: ^2.8.2
  chewie: ^1.7.1
  better_player: ^0.0.84
  
  # Image
  image_picker: ^1.0.7
  photo_view: ^0.14.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.3.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  
  # Ads - Google AdMob
  google_mobile_ads: ^4.0.0
  
  # Payments
  flutter_stripe: ^10.0.0
  purchases_flutter: ^6.1.0
  
  # Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # Analytics
  firebase_analytics: ^10.8.0
  
  # Crash Reporting
  firebase_crashlytics: ^3.4.9
  
  # In-app review
  in_app_review: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/ads/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
