plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // FIX: Use compileSdk 34 instead of 35 (more stable)
    compileSdkVersion 34
    
    // FIX: Add namespace for newer Gradle versions
    namespace "com.chas_ai.creator"
    
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.chas_ai.creator"
        minSdkVersion 21
        targetSdkVersion 34  // FIX: Match compileSdk
        versionCode flutter.versionCode
        versionName flutter.versionName
        
        // FIX: Disable shrinking for now to avoid resource issues
        resConfigs "en"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            
            // FIX: Add these to prevent resource shrinking issues
            shrinkResources false
            minifyEnabled false
            
            // Or if you need ProGuard:
            // minifyEnabled true
            // proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"
}
