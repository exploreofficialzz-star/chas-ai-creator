name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Android folder structure
        run: |
          echo "=== Root ==="
          ls -la
          echo ""
          echo "=== Android folder ==="
          ls -la android/ 2>/dev/null || echo "MISSING: android/"
          echo ""
          echo "=== Android app folder ==="
          ls -la android/app/ 2>/dev/null || echo "MISSING: android/app/"
          echo ""
          echo "=== build.gradle (project) ==="
          ls -la android/build.gradle 2>/dev/null || echo "MISSING: android/build.gradle"
          echo ""
          echo "=== settings.gradle ==="
          ls -la android/settings.gradle 2>/dev/null || echo "MISSING: android/settings.gradle"
          echo ""
          echo "=== gradle.properties ==="
          ls -la android/gradle.properties 2>/dev/null || echo "MISSING: android/gradle.properties"
          echo ""
          echo "=== app/build.gradle ==="
          ls -la android/app/build.gradle 2>/dev/null || echo "MISSING: android/app/build.gradle"
          echo ""
          echo "=== AndroidManifest.xml ==="
          ls -la android/app/src/main/AndroidManifest.xml 2>/dev/null || echo "MISSING: AndroidManifest.xml"
          echo ""
          echo "=== MainActivity.kt ==="
          ls -la android/app/src/main/kotlin/com/chasaicreator/app/MainActivity.kt 2>/dev/null || echo "MISSING: MainActivity.kt"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Try to fix missing files
        run: |
          # Create missing directories
          mkdir -p android/app/src/main/kotlin/com/chasaicreator/app
          
          # Create project build.gradle if missing
          if [ ! -f android/build.gradle ]; then
            cat > android/build.gradle << 'EOF'
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
EOF
          fi
          
          # Create settings.gradle if missing
          if [ ! -f android/settings.gradle ]; then
            cat > android/settings.gradle << 'EOF'
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}
include ":app"
EOF
          fi
          
          # Create gradle.properties if missing
          if [ ! -f android/gradle.properties ]; then
            cat > android/gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
EOF
          fi
          
          # Create MainActivity.kt if missing
          if [ ! -f android/app/src/main/kotlin/com/chasaicreator/app/MainActivity.kt ]; then
            cat > android/app/src/main/kotlin/com/chasaicreator/app/MainActivity.kt << 'EOF'
package com.chasaicreator.app
import io.flutter.embedding.android.FlutterFragmentActivity
class MainActivity: FlutterFragmentActivity()
EOF
          fi
          
          echo "=== After fix ==="
          ls -la android/
          ls -la android/app/

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/flutter/flutter/raw/3.19.0/packages/flutter_tools/gradle/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --verbose

      - name: Find APK
        if: always()
        run: |
          find build -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la build/app/outputs/ 2>/dev/null || echo "No outputs directory"
