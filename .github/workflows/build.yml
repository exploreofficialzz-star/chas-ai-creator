name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
            https://github.com/flutter/flutter/raw/3.19.0/packages/flutter_tools/gradle/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Create key.properties
        run: |
          mkdir -p /home/runner/.android
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=androiddebugkey" >> android/key.properties
          echo "storeFile=/home/runner/.android/debug.keystore" >> android/key.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore /home/runner/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Find and copy APK
        run: |
          echo "=== Searching for APK ==="
          find build -name "*.apk" -type f 2>/dev/null
          mkdir -p output
          find build -name "*.apk" -type f -exec cp {} output/ \;
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: chas-ai-creator-apk
          path: output/*.apk
          if-no-files-found: error
          retention-days: 5
