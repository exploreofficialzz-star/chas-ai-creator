name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls -la $ANDROID_HOME || echo "ANDROID_HOME not set"
          ls -la /usr/local/lib/android/sdk 2>/dev/null || echo "Default SDK path not found"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Check project structure
        run: |
          echo "=== Current directory ==="
          pwd
          ls -la
          echo ""
          echo "=== Android directory ==="
          ls -la android/ 2>/dev/null || echo "android directory not found"
          echo ""
          echo "=== Gradle wrapper ==="
          ls -la android/gradle/wrapper/ 2>/dev/null || echo "wrapper not found"
          echo ""
          echo "=== Check gradlew ==="
          file android/gradlew 2>/dev/null || echo "gradlew not found"
          head -5 android/gradlew 2>/dev/null || echo "cannot read gradlew"

      - name: Create local.properties
        run: |
          echo "flutter.sdk=${FLUTTER_ROOT}" > android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk" >> android/local.properties
          echo "flutter.buildMode=release" >> android/local.properties
          echo "flutter.versionName=1.0.0" >> android/local.properties
          echo "flutter.versionCode=1" >> android/local.properties
          cat android/local.properties

      - name: Setup Gradle wrapper
        run: |
          mkdir -p android/gradle/wrapper
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
              https://github.com/flutter/flutter/raw/3.19.0/packages/flutter_tools/gradle/gradle-wrapper.jar
            echo "Download complete. File size:"
            ls -lh android/gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x android/gradlew
          ls -la android/gradlew

      - name: Create key.properties
        run: |
          mkdir -p /home/runner/.android
          echo "storePassword=android" > android/key.properties
          echo "keyPassword=android" >> android/key.properties
          echo "keyAlias=androiddebugkey" >> android/key.properties
          echo "storeFile=/home/runner/.android/debug.keystore" >> android/key.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore /home/runner/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" || echo "Keystore may already exist"

      - name: Get dependencies
        run: flutter pub get

      - name: Try build with verbose output
        run: |
          flutter build apk --release --verbose 2>&1 | head -100

      - name: Check build directory
        if: failure()
        run: |
          echo "=== Build directory contents ==="
          ls -la build/ 2>/dev/null || echo "build directory not found"
          echo ""
          echo "=== App directory ==="
          ls -la build/app/ 2>/dev/null || echo "app directory not found"
          echo ""
          echo "=== Find any APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
