name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      # Clean previous builds
      - name: Clean Project
        run: |
          flutter clean
          rm -rf android

      # Recreate Android folder (without downloading dependencies)
      - name: Recreate Android Project
        run: flutter create --platforms=android --no-pub .

      # Install Dart dependencies
      - name: Install Dependencies
        run: flutter pub get

      # Build APK
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons --no-shrink

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chas-ai-creator-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
