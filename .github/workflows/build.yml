name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Fix Android Project
        run: |
          flutter clean
          rm -rf android
          flutter create --platforms=android .
      
      - name: Update Android Config
        run: |
          # Update compileSdkVersion to 35
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/targetSdkVersion 34/targetSdkVersion 35/g' android/app/build.gradle
          
          # Update Kotlin version to 1.9.0
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = '\''1.9.0'\''/g' android/build.gradle
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chas-ai-creator-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
