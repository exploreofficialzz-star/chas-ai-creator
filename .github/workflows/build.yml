name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      # Clean old builds
      - name: Clean Project
        run: |
          flutter clean
          rm -rf android

      # Recreate Android project
      - name: Recreate Android Project
        run: flutter create --platforms=android .

      # SETTINGS.GRADLE
      - name: Fix settings.gradle
        run: |
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "com.android.application" version "7.4.2" apply false
              id "org.jetbrains.kotlin.android" version "1.7.21" apply false
          }

          include ":app"
          EOF

      # ROOT BUILD.GRADLE
      - name: Fix root build.gradle
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.7.21'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      # APP BUILD.GRADLE
      - name: Fix app/build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
          }

          android {
              namespace "com.chas.aicreator"
              compileSdk 34

              defaultConfig {
                  applicationId "com.chas.aicreator"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      shrinkResources false
                      signingConfig signingConfigs.debug
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:1.7.21"
          }
          EOF

      # GRADLE PROPERTIES
      - name: Fix gradle.properties
        run: |
          cat > android/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8=false
          kotlin.incremental=false
          EOF

      # GRADLE WRAPPER
      - name: Fix Gradle Wrapper
        run: |
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.5.1-all.zip
          EOF

      # MAIN ACTIVITY
      - name: Fix MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/chas/aicreator
          cat > android/app/src/main/kotlin/com/chas/aicreator/MainActivity.kt << 'EOF'
          package com.chas.aicreator

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity: FlutterActivity()
          EOF

      # ANDROID MANIFEST
      - name: Fix AndroidManifest
        run: |
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.chas.aicreator">

              <application
                  android:label="chas_ai_creator"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>

              </application>
          </manifest>
          EOF

      # INSTALL DEPENDENCIES
      - name: Install Dependencies
        run: flutter pub get

      # BUILD APK
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --no-shrink

      # UPLOAD APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chas-ai-creator-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
